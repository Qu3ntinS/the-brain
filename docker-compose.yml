services:
  postgres:
    image: postgres:17-alpine
    container_name: the-brain-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain}
      POSTGRES_DB: ${POSTGRES_DB:-brain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-brain} -d ${POSTGRES_DB:-brain}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  adminer:
    image: adminer:4
    container_name: the-brain-adminer
    restart: unless-stopped
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: the-brain-mailpit
    restart: unless-stopped
    ports:
      - '${MAILPIT_WEB_PORT:-18025}:8025'
      - '${MAILPIT_SMTP_PORT:-11025}:1025'

volumes:
  postgres_data:
